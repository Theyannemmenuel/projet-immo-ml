name: immo-ml-sdn

topology:
  nodes:
    router1:
      kind: linux
      image: alpine:latest

    router2:
      kind: linux
      image: alpine:latest

    router3:
      kind: linux
      image: alpine:latest

  links:
    - endpoints: ["router1:eth1", "router2:eth1"]
    - endpoints: ["router2:eth2", "router3:eth1"]
    - endpoints: ["router1:eth2", "router3:eth2"]
